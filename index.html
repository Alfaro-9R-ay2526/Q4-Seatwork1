<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Q4 Seatwork 1</title>


   <!-- Bootstrap -->
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
   <!-- Custom CSS -->
   <link rel="stylesheet" href="style.css">


</head>
<body>
   <form>
       <div class="container p-4 mt-5 mb-5 rounded bg-white">
           <h1>Account Login</h1>
           <hr>


           <details ontoggle="alert('Enter admin/1234 to login')">
               <summary class="btn btn-sm btn-outline-secondary mb-3">Instructions</summary>
               <p class="small text-muted">Enter the credentials shown in the alert box.</p>
           </details>


           <br>


           <div class="row">
               <!--Username-->
               <div class="col-6">
                   <label>Username:</label>
                   <input type="text" class="form-control mb-3" id="useID" placeholder="Enter Username">
                       <p id="name"></p>
               </div>
               <!--Password-->
               <div class="col-6">
                   <label>Password:</label>
                   <input type="password" class="form-control mb-3" id="useS" placeholder="Enter Password">
                       <p id="pkey"></p>
                   <br>
               </div>
               <!--Checkbox-->
               <div class="form-check mb-3">
                   <input class="form-check-input" type="checkbox" id="remember">
                   <label class="form-check-label" for="remember">Remember me</label>
               </div>
               <br>
               <!-- Buttons -->
               <div class="col-12">
                   <button type="button" class="btn btn-danger mt-3" onclick="window.location.reload()">Cancel</button>
               </div>
               <div class="col-12">
                   <button type="button" onclick="getAccess()" class="btn btn-primary mt-3">Login into Account</button>
               </div>
               <br><br>
               <!--Links that saved me-->
               <br>
               <hr>
               <h5>Resources</h5>
                   <ul>
                       <li>
                           <a href="https://www.w3schools.com/js/js_if.asp">The JavaScript if Statement</a>
                       </li>
                   </ul>
                   <ul>
                       <li>
                           <a href="https://www.w3schools.com/js/js_if_else.asp">The JavaScript else Statement</a>
                       </li>
                   </ul>
                   <ul>
                       <li>
                           <a href="https://www.w3schools.com/js/js_switch.asp">The JavaScript switch Statement</a>
                       </li>
                   </ul>
                 

           </div>
       </div>
   </form>


   <script src="main.js"></script>
</body>
</html>
